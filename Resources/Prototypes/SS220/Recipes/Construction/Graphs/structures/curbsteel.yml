- type: constructionGraph
  id: CurbSteel
  start: start
  graph:
  - node: start
    edges:
      - to: curbSteel
        completed:
          - !type:SnapToGrid { }
        steps:
          - material: Steel
            amount: 1
            doAfter: 2
      - to: curbSteelCorner
        completed:
          - !type:SnapToGrid { }
        steps:
          - material: Steel
            amount: 2
            doAfter: 2.5
      - to: curbSteelCornerSmall
        completed:
          - !type:SnapToGrid { }
        steps:
          - material: Steel
            amount: 1
            doAfter: 2
      - to: curbSteelRound
        completed:
          - !type:SnapToGrid { }
        steps:
          - material: Steel
            amount: 2
            doAfter: 2

  - node: curbSteel
    entity: CurbSteelDecoration
    edges:
      - to: start
        completed:
          - !type:SpawnPrototype
            prototype: SheetSteel1
            amount: 1
          - !type:DeleteEntity
        steps:
          - tool: Screwing
            doAfter: 0.25

  - node: curbSteelCorner
    entity: CurbSteelCornerDecoration
    edges:
      - to: start
        completed:
          - !type:SpawnPrototype
            prototype: SheetSteel1
            amount: 2
          - !type:DeleteEntity
        steps:
          - tool: Screwing
            doAfter: 0.5

  - node: curbSteelCornerSmall
    entity: CurbSteelCornerSmallDecoration
    edges:
      - to: start
        completed:
          - !type:SpawnPrototype
            prototype: SheetSteel1
            amount: 1
          - !type:DeleteEntity
        steps:
          - tool: Screwing
            doAfter: 0.25

  - node: curbSteelRound
    entity: CurbSteelRoundDecoration
    edges:
      - to: start
        completed:
          - !type:SpawnPrototype
            prototype: SheetSteel1
            amount: 2
          - !type:DeleteEntity
        steps:
          - tool: Screwing
            doAfter: 0.5
