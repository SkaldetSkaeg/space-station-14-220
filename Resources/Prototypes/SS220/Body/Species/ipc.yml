- type: markingsGroup
  parent: Undergarments
  id: Ipc
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.Hair: #antennas
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Head: 
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop: #wires
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Snout: #screen
      limit: 1
      required: true
      default: [ ScreenStatic ]
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceIpc
  categories: [ HideSpawnMenu ]
  name: ipc appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganIpcTorso
      Head: OrganIpcHead
      ArmLeft: OrganIpcArmLeft
      ArmRight: OrganIpcArmRight
      HandRight: OrganIpcHandRight
      HandLeft: OrganIpcHandLeft
      LegLeft: OrganIpcLegLeft
      LegRight: OrganIpcLegRight
      FootLeft: OrganIpcFootLeft
      FootRight: OrganIpcFootRight
      Brain: OrganIpcBrain
      #Eyes: OrganIpcEyes
  - type: HumanoidProfile
    species: Ipc
  - type: Inventory
    templateId: Ipc

- type: entity
  parent:
  - AppearanceIpc
  - BaseSpeciesMob
  - MobFlammable
  - MobAtmosExposed
  id: MobIpc
  name: Urist McIPC
  components:
  - type: RemoveComponentsOnTrigger
    keysIn:
      - RemoveInternalsOnly
    components:
      - type: Internals
  - type: TriggerOnSpawn
    keyOut: RemoveInternalsOnly
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#cd7314"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: TypingIndicator
    proto: robot
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Stutter
    - Electrocution
    - SlurredSpeech
    - RatvarianLanguage
    - PressureImmunity
    - Muted
    - ForcedSleep
    - TemporaryBlindness
    - Pacified
    - StaminaModifier
    - Flashed
    - RadiationProtection
  - type: MagicMirror
    organs:
    - Head
    layers:
    - Snout
    changeHairSound: null
    modifyTime: 0
    showPopup: false
    checkHeadSlot: false
  #- type: ActivatableUI
  #  key: enum.MagicMirrorUiKey.Key
  #  singleUser: true
  - type: UserInterface
    interfaces:
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.MagicMirrorUiKey.Key:
        type: MagicMirrorBoundUserInterface
  - type: Language
    availableLanguages:
    - id: Galactic
    - id: Binary
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Ipc
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 325
    coldDamageThreshold: 260
    coldDamage:
      types:
        Cold: 0
    heatDamage:
      types:
        Heat: 1.5
  - type: ComplexInteraction
  - type: BodyEmotes
    soundsId: IpcEmotes
  - type: Vocal
    sounds:
      Male: MaleIpc
      Female: FemaleIpc
      Unsexed: MaleIpc
    screamAction: ActionIpcScream
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    damage:
      types:
        Slash: 5
  - type: Damageable
    damageContainer: Ipc
    damageModifierSet: Ipc
  - type: ToggleableVisuals
    spriteLayer: light 
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    radius: 4
    netsync: True
  - type: HandheldLight
    toggleOnInteract: false
    wattage: 0.2
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
    toggleAction: ActionIpcToggleLight
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour
      id: radiating
      maxDuration: 2.0
      startValue: 3.0
      endValue: 2.0
      isLooped: true
      reverseWhenFinished: true
    - !type:PulseBehaviour
      id: blinking
      interpolate: Nearest
      maxDuration: 1.0
      startValue: 0.1
      endValue: 2.0
      isLooped: true
  - type: ZombieImmune
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: CableApcStack1
      amount: 4
  - type: Unrevivable
  - type: SleepEmitSound
    snore: /Audio/Machines/buzz-two.ogg
    interval: 30
    popUp: sleep-ipc
  - type: PressureImmunity
  - type: Reflect
    reflectProb: 0.05
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
  - type: DamagedSiliconAccent
  - type: ProtectedFromStepTriggers
  - type: EyeProtection
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTypeTrigger
        damageType: Heat
        damage: 1500
      behaviors:
      - !type:EmptyContainersBehaviour
        containers:
        - cell_slot
      - !type:GibBehavior {}
    - trigger: !type:DamageTypeTrigger
        damageType: Blunt
        damage: 400
      behaviors:
      - !type:EmptyContainersBehaviour
        containers:
        - cell_slot
      - !type:GibBehavior {}
  - type: FireVisuals
    alternateState: Standing
  - type: Fingerprint
  - type: Blindable
  - type: Barotrauma
    damage:
      types:
        Blunt: 0
        Heat: 0
  - type: Ipc
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: PowerCellDraw
    drawRate: 0.8
  - type: AccessReader
    access: [ ["Ipc"] ]
  - type: Access
    enabled: true
    tags:
      - Ipc
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: Lock
    unlockOnClick: false
  - type: ItemSlotsLock
    slots:
    - cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot { }
  - type: MultiRepairable
    selfRepairPenalty: 2
    options:
      - qualityNeeded: Welding
        doAfterDelay: 1.2
        fuelCost: 5
        damage:
          types:
             Slash: -10
      - qualityNeeded: Screwing
        doAfterDelay: 1.2
        damage:
          types:
             Piercing: -5
      - qualityNeeded: Anchoring
        doAfterDelay: 1.2
        damage:
          types:
             Blunt: -5
      - qualityNeeded: Cutting
        doAfterDelay: 1.2
        damage:
          types:
             Heat: -5
      - qualityNeeded: Pulsing
        doAfterDelay: 1.2
        damage:
          types:
             Shock: -5
      - qualityNeeded: Prying
        doAfterDelay: 1.2
        damage:
          types:
             Caustic: -5
  - type: Experience
  - type: StunVisuals

- type: entity
  parent: OrganBase
  id: OrganIpc
  abstract: true
  suffix: ipc

- type: entity
  id: OrganIpcMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Ipc ]

- type: entity
  parent: OrganIpc
  id: OrganIpcInternal
  abstract: true
