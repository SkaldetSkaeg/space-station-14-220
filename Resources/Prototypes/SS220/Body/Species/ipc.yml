  id: OrganIpcArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganIpcExternal ]
  id: OrganIpcArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganIpcExternal ]
  id: OrganIpcHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganIpcExternal ]
  id: OrganIpcHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganIpcExternal ]
  id: OrganIpcLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganIpcExternal ]
  id: OrganIpcLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganIpcExternal ]
  id: OrganIpcFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganIpcExternal ]
  id: OrganIpcFootRight

- type: entity
  parent: [ OrganBaseBrain, OrganSpriteHumanInternal, OrganIpcInternal ]
  id: OrganIpcBrain
  components:
  - type: Sprite
    sprite: SS220/Mobs/Species/Ipc/organs.rsi
    state: brain
  - type: BorgBrain

