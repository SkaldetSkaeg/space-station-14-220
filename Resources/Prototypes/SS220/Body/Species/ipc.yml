  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: SS220/Mobs/Species/Ipc/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Ipc

- type: entity
  parent: [ OrganIpc, OrganIpcVisual ]
  id: OrganIpcExternal
